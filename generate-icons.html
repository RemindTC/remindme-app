<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const s = size/192;
  
  // Background
  ctx.fillStyle = '#0c0f0a';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, 40*s);
  ctx.fill();
  
  // Clock circle
  ctx.strokeStyle = '#b8f566';
  ctx.lineWidth = 8*s;
  ctx.beginPath();
  ctx.arc(size/2, size*0.44, 45*s, 0, Math.PI*2);
  ctx.stroke();
  
  // Clock hands
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(size/2, size*0.18);
  ctx.lineTo(size/2, size*0.44);
  ctx.lineTo(size*0.615, size*0.557);
  ctx.stroke();
  
  // Bottom bars
  ctx.fillStyle = '#b8f566';
  ctx.beginPath();
  ctx.roundRect(size*0.365, size*0.677, 52*s, 8*s, 4*s);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(size*0.427, size*0.719, 28*s, 8*s, 4*s);
  ctx.fill();
  
  return canvas.toDataURL('image/png');
}

const c192 = document.getElementById('c192');
const c512 = document.getElementById('c512');
const img192 = drawIcon(c192, 192);
const img512 = drawIcon(c512, 512);

// Download both
function download(dataUrl, name) {
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = name;
  a.click();
}

document.body.innerHTML += '<br><button onclick="download(\'' + img192 + '\', \'icon-192.png\')">Download icon-192.png</button>';
document.body.innerHTML += '<br><button onclick="download(\'' + img512 + '\', \'icon-512.png\')">Download icon-512.png</button>';
</script>
</body>
</html>
